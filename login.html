<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima+ | Login de Acesso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #30515F;
            --secondary: #7CB342;
            --bg: #F8FAFC;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-wrap {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            color: var(--secondary);
            width: 40px;
            height: 40px;
        }

        .brand-name {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .brand-plus {
            color: var(--secondary);
        }

        h2 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        p {
            color: #64748B;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(124, 179, 66, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: #243e49;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(48, 81, 95, 0.2);
        }

        .error-msg {
            color: #D32F2F;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            font-weight: 500;
        }

        .footer-text {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94A3B8;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo-wrap">
            <i data-lucide="zap" class="logo-icon"></i>
            <span class="brand-name">Clima<span class="brand-plus">+</span></span>
        </div>

        <h2>Bem-vindo</h2>
        <p>Acesse o Dashboard de Indicadores</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar no Sistema</button>
            <div id="errorMsg" class="error-msg">Usuário ou senha incorretos!</div>
        </form>

        <div class="footer-text">
            © 2026 Inteligência de Dados - Grupo Oficial
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Check if already logged in (for simple redirection back if accessed directly)
        if (sessionStorage.getItem('clima_auth') === 'true') {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMsg');

            if (user === 'gestao' && pass === 'gestao') {
                sessionStorage.setItem('clima_auth', 'true');
                window.location.href = 'index.html';
            } else {
                error.style.display = 'block';
                // Shake effect
                const card = document.querySelector('.login-card');
                card.style.animation = 'none';
                card.offsetHeight; // trigger reflow
                card.style.animation = 'shake 0.4s ease-in-out';
            }
        });
    </script>
    <style>
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            50% {
                transform: translateX(8px);
            }

            75% {
                transform: translateX(-8px);
            }
        }
    </style>
</body>

</html>
